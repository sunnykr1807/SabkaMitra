<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Image Resize Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="text-center mb-4">📏 Image Resize Tool</h1>

<div class="card shadow p-4">

<input type="file" id="imageInput" class="form-control mb-3" accept="image/*">
<select id="preset" class="form-select mb-3">
  <option value="">Select Size Preset</option>
  <option value="200x250">Passport Photo (200×250)</option>
  <option value="140x60">Signature (140×60)</option>
  <option value="300x300">Square Photo (300×300)</option>
  <option value="600x400">Landscape (600×400)</option>
  <option value="custom">Custom Size</option>
</select>
<div class="row mb-3">

<div class="col">
<input type="number" id="width" class="form-control" placeholder="Width">
</div>

<div class="col">
<input type="number" id="height" class="form-control" placeholder="Height">
</div>

</div>

<div class="text-center">
<img id="preview" class="img-fluid rounded d-none" style="max-height:300px;">
</div>

<div class="text-center mt-4">
<button class="btn btn-success" onclick="resizeImage()">
Resize & Download
</button>
</div>

</div>

</div>

<script>
let selectedFile;
document.getElementById("preset").addEventListener("change", function(){

const value = this.value;

if(value === "custom" || value === "") return;

const size = value.split("x");

document.getElementById("width").value = size[0];
document.getElementById("height").value = size[1];

});
document.getElementById('imageInput').addEventListener('change', function(e){

selectedFile = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){

const preview = document.getElementById('preview');

preview.src = event.target.result;
preview.classList.remove('d-none');

}

reader.readAsDataURL(selectedFile);

});

function resizeImage(){

if(!selectedFile){
alert("Please select image");
return;
}

const width = parseInt(document.getElementById("width").value);
const height = parseInt(document.getElementById("height").value);

if(!width || !height){
alert("Enter width and height");
return;
}

const img = new Image();

img.onload = function(){

const canvas = document.createElement("canvas");

canvas.width = width;
canvas.height = height;

const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0,width,height);

const resizedImage = canvas.toDataURL("image/png");
const a = document.createElement("a");

a.href = resizedImage;
a.download = "resized-image.jpg";

a.click();

};

img.src = URL.createObjectURL(selectedFile);

}

</script>

</body>
</html>
