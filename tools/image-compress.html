<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Image Compress Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="text-center mb-4">📉 Image Compress Tool</h1>

<div class="card shadow p-4">

<input type="file" id="imageInput" class="form-control mb-3" accept="image/*">

<select id="quality" class="form-select mb-3">
<option value="0.9">High Quality</option>
<option value="0.7" selected>Medium Quality</option>
<option value="0.5">Low Quality</option>
</select>

<div class="text-center">
<img id="preview" class="img-fluid rounded d-none" style="max-height:300px;">
</div>

<div class="text-center mt-4">
<button class="btn btn-primary" onclick="compressImage()">
Compress & Download
</button>
</div>

</div>

</div>

<script>

let selectedFile;

document.getElementById('imageInput').addEventListener('change', function(e){

selectedFile = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){

const preview = document.getElementById('preview');

preview.src = event.target.result;
preview.classList.remove('d-none');

}

reader.readAsDataURL(selectedFile);

});

function compressImage(){

if(!selectedFile){
alert("Please select image");
return;
}

const quality = parseFloat(document.getElementById("quality").value);

const img = new Image();

img.onload = function(){

const canvas = document.createElement("canvas");

canvas.width = img.width;
canvas.height = img.height;

const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0);

const compressed = canvas.toDataURL("image/jpeg", quality);

const a = document.createElement("a");

a.href = compressed;

a.download = "compressed-image.jpg";

a.click();

};

img.src = URL.createObjectURL(selectedFile);

}

</script>

</body>
</html>
