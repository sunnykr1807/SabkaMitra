<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PNG Converter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="text-center mb-4">📸 JPG to PNG Converter</h1>

<div class="card shadow p-4">

<input type="file" id="imageInput" class="form-control mb-3" accept=".jpg,.jpeg,image/jpeg">

<div class="text-center">
<img id="preview" class="img-fluid rounded d-none" style="max-height:300px;">
</div>

<div class="text-center mt-4">
<button class="btn btn-success" onclick="convertToPNG()">
Convert & Download PNG
</button>
</div>

</div>

</div>

<script>

let selectedFile;

document.getElementById('imageInput').addEventListener('change', function(e){

selectedFile = e.target.files[0];

if(!selectedFile) return;

const reader = new FileReader();

reader.onload = function(event){

const preview = document.getElementById('preview');

preview.src = event.target.result;
preview.classList.remove('d-none');

}

reader.readAsDataURL(selectedFile);

});

function convertToPNG(){

if(!selectedFile){

alert("Please select a JPG image.");
return;

}

const img = new Image();

img.onload = function(){

const canvas = document.createElement("canvas");

canvas.width = img.width;
canvas.height = img.height;

const ctx = canvas.getContext("2d");

ctx.drawImage(img,0,0);

const pngUrl = canvas.toDataURL("image/png");

const a = document.createElement("a");

a.href = pngUrl;

a.download = "converted-image.png";

a.click();

};

img.src = URL.createObjectURL(selectedFile);

}

</script>

</body>
</html>
