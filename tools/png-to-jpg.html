<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PNG to JPG Converter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="text-center mb-4">🖼️ PNG to JPG Converter</h1>

<div class="card shadow p-4">

<input type="file" id="imageInput" class="form-control mb-3" accept=".png,image/png">

<div class="text-center">
<img id="preview" class="img-fluid rounded d-none" style="max-height:300px;">
</div>

<div class="text-center mt-4">
<button class="btn btn-primary" onclick="convertToJPG()">
Convert & Download JPG
</button>
</div>

</div>

</div>

<script>

let selectedFile;

document.getElementById('imageInput').addEventListener('change', function(e){

selectedFile = e.target.files[0];

if(!selectedFile) return;

const reader = new FileReader();

reader.onload = function(event){

const preview = document.getElementById('preview');

preview.src = event.target.result;
preview.classList.remove('d-none');

}

reader.readAsDataURL(selectedFile);

});

function convertToJPG(){

if(!selectedFile){

alert("Please select a PNG image.");
return;

}

const img = new Image();

img.onload = function(){

const canvas = document.createElement("canvas");

canvas.width = img.width;
canvas.height = img.height;

const ctx = canvas.getContext("2d");

/* White background */
ctx.fillStyle = "#ffffff";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0);

const jpgUrl = canvas.toDataURL("image/jpeg",0.95);

const a = document.createElement("a");

a.href = jpgUrl;

a.download = "converted-image.jpg";

a.click();

};

img.src = URL.createObjectURL(selectedFile);

}

</script>

</body>
</html>
